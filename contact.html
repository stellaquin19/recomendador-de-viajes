<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Travel Fun</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        header {
            background: linear-gradient(135deg, #0e243b 0%, #133754 100%);
            color: #ffffff;
            padding: 18px 24px;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .brand .logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #0e243b;
            font-size: 1.1rem;
        }
        .nav-links {
            display: flex;
            gap: 24px;
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }
        .nav-links a:hover {
            color: #c7e8ff;
        }
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .section-title {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #0e243b;
        }
        .contact-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
        }
        .contact-card label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0f172a;
        }
        .contact-card input,
        .contact-card textarea {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 1rem;
            color: #111827;
            resize: vertical;
        }
        .contact-card textarea {
            min-height: 160px;
        }
        .contact-card button {
            background: #0794a5;
            color: #ffffff;
            border: none;
            border-radius: 999px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .contact-card button:hover {
            background: #05767d;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="brand">
                <span class="logo">TB</span>
                <span>Travel Fun</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-card">
            <h1 class="section-title">Contact Us</h1>
            <p>If you have any questions or want to reach out, please fill out the form below and we will get back to you as soon as possible.</p>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required />

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required />

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
</body>
</html>
